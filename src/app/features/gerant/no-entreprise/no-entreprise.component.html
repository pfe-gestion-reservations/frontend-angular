
    <div class="block-page">
      <div class="block-card">
        <div class="block-icon"><i class="fas fa-building"></i></div>
        <h1 class="block-title">Compte non assigné</h1>
        <p class="block-msg">
          Votre compte gérant n'est pas encore associé à une entreprise.<br>
          Veuillez contacter votre administrateur.
        </p>
        <div class="block-user">
          <div class="bu-avatar">{{ initials }}</div>
          <div>
            <div class="bu-name">{{ user?.nom }} {{ user?.prenom }}</div>
            <div class="bu-email">{{ user?.email }}</div>
          </div>
        </div>
        <button class="btn-logout" (click)="logout()">
          <i class="fas fa-sign-out-alt"></i> Se déconnecter
        </button>
      </div>
    </div>
